<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>DESTINO 당근 광고 — 힉스필드 배경 합성판 (1200×628)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@800;900&family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --ink: #1C1917; --ink-muted: #6B5E53; --ink-light: #8B7E74; --seal: #C53D43; --paper: #F5F0E8; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ddd; font-family: 'Pretendard', sans-serif; word-break: keep-all; }
  .ad {
    width: 1200px; height: 628px; margin: 20px auto; position: relative; overflow: hidden;
    background-size: cover; background-position: right center;
  }
  /* 왼쪽 텍스트 가독 패널 — 한지색 그라데이션 */
  .ad::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(245,240,232,0.97) 0%, rgba(245,240,232,0.92) 44%, rgba(245,240,232,0.35) 68%, rgba(245,240,232,0) 100%);
  }
  .txt { position: absolute; left: 80px; top: 50%; transform: translateY(-50%); width: 620px; z-index: 2; }
  .brand { font-family: 'Noto Serif KR', serif; font-weight: 800; font-size: 24px; letter-spacing: 0.35em; color: var(--ink-light); margin-bottom: 24px; }
  h1 { font-family: 'Noto Serif KR', serif; font-weight: 900; font-size: 96px; line-height: 1.2; letter-spacing: -0.03em; color: var(--ink); margin-bottom: 30px; }
  h1 em { font-style: normal; color: var(--seal); }
  .sub { display: none; }
  .cta { display: inline-block; background: var(--seal); color: #fff; font-weight: 800; font-size: 36px; padding: 20px 42px; border-radius: 16px; box-shadow: 0 6px 24px rgba(197,61,67,0.35); }
  .frame { position: absolute; inset: 22px; border: 1.5px solid rgba(28,25,23,0.14); z-index: 3; pointer-events: none; }
</style>
</head>
<body>

<div class="ad" id="ad-01" style="background-image:url('photos/bg-01.png')">
  <div class="frame"></div>
  <div class="txt">
    <div class="brand">DESTINO</div>
    <h1>사주와 별자리가<br><em>같은 말</em>을 합니다</h1>
    <div class="sub">서로 모르는 6개 문명이 같은 결론을 내리는 지점, 교차점을 찾아드려요.</div>
    <div class="cta">짠 것도 아닌데? 30초 확인</div>
  </div>
</div>

<div class="ad" id="ad-02" style="background-image:url('photos/bg-02.png')">
  <div class="frame"></div>
  <div class="txt">
    <div class="brand">DESTINO</div>
    <h1>한 번이면 우연,<br><em>네 번</em>이면?</h1>
    <div class="sub">사주 · 별자리 · 수비학 · MBTI가 겹치는 정도를 수렴률로 보여드립니다.</div>
    <div class="cta">겹치는지 무료 확인</div>
  </div>
</div>

<div class="ad" id="ad-03" style="background-image:url('photos/bg-03.png')">
  <div class="frame"></div>
  <div class="txt">
    <div class="brand">DESTINO</div>
    <h1>우리 궁합,<br><em>네 번</em> 물어봤습니다</h1>
    <div class="sub">한 가지 체계 말고, 동서양 4개 체계로 두 사람의 교차점을 비교해보세요.</div>
    <div class="cta">사주×별자리 궁합 무료</div>
  </div>
</div>

<script>
const only = new URLSearchParams(location.search).get('only');
if (only) {
  document.body.style.background = 'transparent';
  document.querySelectorAll('.ad').forEach(el => {
    if (el.id === 'ad-' + String(only).padStart(2, '0')) { el.style.margin = '0'; }
    else { el.style.display = 'none'; }
  });
}
</script>
</body>
</html>
